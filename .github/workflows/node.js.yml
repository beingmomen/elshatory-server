name: Node.js CI

on:
  push:
    branches:
      - main
      - prod

jobs:
  deploy:
    name: Deploy (${{ matrix.environment }})
    runs-on: ${{ format('self-hosted,{0}', matrix.environment) }}

    strategy:
      matrix:
        include:
          - branch: main
            environment: demo
            env_var: ENV_DEMO
          - branch: prod
            environment: prod
            env_var: ENV_PROD

    steps:
      - name: Skip if branch doesn't match
        if: github.ref != format('refs/heads/{0}', matrix.branch)
        run: echo "Branch doesn't match. Skipping..." && exit 0

      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: echo "${{ vars[matrix.env_var] }}" > config.env

      - name: Build project
        run: npm run build --if-present

      - name: Restart with PM2
        run: pm2 start server.js || pm2 restart server.js
