name: Node.js CI

on:
  push:
    branches:
      - "main"
      - "prod"

jobs:
  deploy:
    name: Deploy (${{ matrix.environment }})

    runs-on: [self-hosted, ${{ matrix.environment }}]

    if: github.ref == 'refs/heads/' + matrix.branch

    strategy:
      matrix:
        include:
          - branch: main
            environment: demo
            env_var: ENV_DEMO
          - branch: prod
            environment: prod
            env_var: ENV_PROD

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: echo "${{ vars[matrix.env_var] }}" > config.env

      - name: Build project
        run: npm run build --if-present

      - name: Restart with PM2
        run: pm2 start server.js || pm2 restart server.js
