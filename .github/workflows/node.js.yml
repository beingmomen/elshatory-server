name: Node.js CI

on:
  push:
    branches:
      - "main"
      - "prod"

jobs:
  deploy-demo:
    name: Deploy to Demo Server
    runs-on: [self-hosted, demo]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - run: npm install
      - run: echo "${{ vars.ENV_DEMO }}" > config.env
      - run: npm run build --if-present
      - run: pm2 start server.js || pm2 restart server.js

  deploy-prod:
    name: Deploy to Production Server
    runs-on: [self-hosted, prod]
    if: github.ref == 'refs/heads/prod'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - run: npm install
      - run: echo "${{ vars.ENV_PROD }}" > config.env
      - run: npm run build --if-present
      - run: pm2 start server.js || pm2 restart server.js
