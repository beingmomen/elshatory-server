name: Node.js CI

on:
  push:
    branches:
      - "main"
      - "prod"

jobs:
  deploy:
    strategy:
      matrix:
        config:
          - { branch: 'main', runner: 'demo', env_var: 'ENV_DEMO' }
          - { branch: 'prod', runner: 'prod', env_var: 'ENV_PROD' }
    if: github.ref == format('refs/heads/{0}', matrix.config.branch)
    runs-on: [self-hosted, ${{ matrix.config.runner }}]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Create .env file
        run: echo "${{ vars[matrix.config.env_var] }}" > config.env
      - name: Build project
        run: npm run build --if-present
      - name: Restart with PM2
        run: pm2 start server.js || pm2 restart server.js