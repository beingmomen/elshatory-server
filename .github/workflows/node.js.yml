name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - "main" # Demo branch
      - "prod" # Production branch

jobs:
  deploy:
    name: Deploy to ${{ matrix.deploy.target }}
    runs-on: ${{ matrix.deploy.labels }}
    strategy:
      matrix:
        deploy:
          - target: "Demo"
            branch_ref: "refs/heads/main"
            labels: [self-hosted, demo]
            env_var: "ENV_DEMO"
          - target: "Production"
            branch_ref: "refs/heads/prod"
            labels: [self-hosted, prod]
            env_var: "ENV_PROD"
      # Only run one matrix combination that matches the current branch
      fail-fast: false
        - ${{ fromJSON(format('[{0}]', 
            contains(github.ref, 'refs/heads/main') && 
            '{"target":"Demo","branch_ref":"refs/heads/main","labels":["self-hosted","demo"],"env_var":"ENV_DEMO"}' || 
            '{"target":"Production","branch_ref":"refs/heads/prod","labels":["self-hosted","prod"],"env_var":"ENV_PROD"}'
          )) }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Create environment configuration
        run: echo "${{ vars[matrix.deploy.env_var] }}" > config.env

      - name: Build project
        run: npm run build --if-present

      - name: Deploy application
        run: pm2 start server.js || pm2 restart server.js